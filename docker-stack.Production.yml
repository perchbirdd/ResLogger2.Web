services:
  web:
    image: ghcr.io/perchbirdd/reslogger2:latest
    ports:
      - "9184:9184"
    volumes:
      - web_data:/web_data/
    env_file:
      - Production.env
    networks:
      - default
      - proxy_net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
        monitor: 15s

  db:
    image: postgres:18.0-alpine3.22
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/
      - pg_backup:/pg_backup/
    env_file:
      - Production.env
    deploy:
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
        monitor: 15s

  seq_forwarder:
    image: ghcr.io/perchbirdd/seq-forwarder:latest
    stdin_open: true
    tty: true
    env_file:
      - Production.env
    deploy:
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
        monitor: 15s

  pg_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter
    ports:
      - "9187:9187"
    env_file:
      - Production.env
    deploy:
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
        monitor: 15s

networks:
  proxy_net:
    external: true

volumes:
  web_data:
  pg_data:
  pg_backup:
